<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bake & Take Grand Opening</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#000000,#1a1a1a);
    overflow-x: hidden;
    color: white;
}

.container {
    text-align: center;
    padding: 40px 20px;
}

.logo {
    font-family: 'Great Vibes', cursive;
    font-size: 60px;
    background: linear-gradient(to right, #00c6ff, #ff6ec4);
    -webkit-background-clip: text;
    color: transparent;
}

.circle {
    width: 320px;
    height: 320px;
    margin: 30px auto;
    border-radius: 50%;
    border: 8px solid gold;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 30px gold;
}

.circle-text {
    text-align: center;
}

.circle-text h1 {
    font-size: 30px;
    margin: 0;
}

.circle-text h2 {
    font-size: 26px;
    color: gold;
    margin: 5px 0;
}

.date {
    font-size: 22px;
    color: #ffcc70;
}

.location {
    font-size: 16px;
    color: #ccc;
}

.btn {
    margin-top: 20px;
    padding: 14px 30px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(to right, #ff6ec4, #00c6ff);
    color: white;
    font-size: 18px;
    cursor: pointer;
}

.btn:hover {
    transform: scale(1.05);
}

.countdown {
    margin-top: 20px;
    font-size: 20px;
    color: gold;
}

/* Confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background: red;
    top: 0;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
    }
}

footer {
    margin-top: 40px;
    color: #888;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">Bake & Take</div>

    <div class="circle">
        <div class="circle-text">
            <h1>GRAND</h1>
            <h2>Opening</h2>
            <p class="date">21 March 2026</p>
            <p class="location">Trincomalee</p>
        </div>
    </div>

    <button class="btn" onclick="startCelebration()">🎉 Join Celebration</button>

    <div class="countdown" id="countdown"></div>

    <footer>Made with ❤️ for Bake & Take</footer>

</div>

<script>
function startCelebration(){
    alert("Welcome to our Grand Opening! 🎂✨");
    createConfetti();
}

function createConfetti(){
    for(let i=0;i<100;i++){
        let confetti=document.createElement('div');
        confetti.classList.add('confetti');

        confetti.style.left=Math.random()*100+'vw';
        confetti.style.backgroundColor=getRandomColor();
        confetti.style.animationDuration=(Math.random()*3+2)+'s';

        document.body.appendChild(confetti);

        setTimeout(()=>{
            confetti.remove();
        },5000);
    }
}

function getRandomColor(){
    const colors=['#ff6ec4','#00c6ff','#ffd700','#ff4d4d','#7cffcb'];
    return colors[Math.floor(Math.random()*colors.length)];
}

// countdown
const eventDate=new Date("March 21, 2026 12:00:00").getTime();

setInterval(()=>{
    const now=new Date().getTime();
    const distance=eventDate-now;

    const d=Math.floor(distance/(1000*60*60*24));
    const h=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
    const m=Math.floor((distance%(1000*60*60))/(1000*60));
    const s=Math.floor((distance%(1000*60))/1000);

    document.getElementById("countdown").innerHTML=
    "⏳ "+d+"d "+h+"h "+m+"m "+s+"s";
},1000);
</script>

</body>
</html>
